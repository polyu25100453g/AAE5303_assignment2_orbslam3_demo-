%YAML:1.0

#--------------------------------------------------------------------------------------------
# Fallback: more aggressive ORB for very low completeness (weak texture / sky / fast motion)
# Use this if camera_config.yaml still gives many "Fail to track local map!" or resets.
# Copy to docs/camera_config.yaml and re-run pipeline, or use run_pipeline_fallback.sh
#--------------------------------------------------------------------------------------------
Camera.type: "PinHole"
Camera.fx: 1444.43
Camera.fy: 1444.34
Camera.cx: 1179.50
Camera.cy: 1044.90
Camera.k1: -0.0560
Camera.k2: 0.1180
Camera.p1: 0.00122
Camera.p2: 0.00064
Camera.k3: -0.0627
Camera.width: 2448
Camera.height: 2048
Camera.fps: 10.0
Camera.RGB: 0

# More features + even lower FAST for difficult frames
ORBextractor.nFeatures: 3500
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 12
ORBextractor.minThFAST: 4

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
